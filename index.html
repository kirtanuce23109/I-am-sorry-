<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Babby ❤️ Bubuu - The Glimpse I Missed</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#111827,#db2777);color:#fff}
section{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}
.box{max-width:1100px;width:100%;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);padding:30px;border-radius:25px;text-align:center}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.gallery img{width:100%;height:320px;object-fit:cover;border-radius:18px}
button,.btn{padding:12px 24px;border:none;border-radius:30px;cursor:pointer}
#game{height:260px;position:relative;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden}
.heart{position:absolute;font-size:28px;cursor:pointer}
</style>
</head>
<body>

<section><div class="box">
<h1>Babby ❤️ Bubuu</h1>
<h2>The Glimpse I Missed</h2>
<p>Almost 3 years together. I didn't just miss the station... I missed seeing you.</p>
</div></section>

<section><div class="box">
<h2>📸 Babby Gallery</h2>
<div class="gallery">
<img src="https://raw.githubusercontent.com/kirtanuce23109/I-am-sorry-/main/babby1.jpg.jpeg">
<img src="https://raw.githubusercontent.com/kirtanuce23109/I-am-sorry-/main/babby2.jpg.jpeg">
<img src="https://raw.githubusercontent.com/kirtanuce23109/I-am-sorry-/main/babby3.jpg.jpeg">
<img src="https://raw.githubusercontent.com/kirtanuce23109/I-am-sorry-/main/babby4.jpg.jpeg">
<img src="https://raw.githubusercontent.com/kirtanuce23109/I-am-sorry-/main/babby5.jpg.jpeg">
</div>
</div></section>

<section><div class="box">
<h2>😡 Anger Meter</h2>
<input type="range" min="0" max="100" style="width:80%" oninput="m.innerHTML='Babby is still 100% adorable ❤️'">
<p id="m"></p>
</div></section>

<section><div class="box">
<h2>🎯 Catch Bubuu's Heart</h2>
<div id="game"></div>
<p id="score">0/10</p>
</div></section>

<section><div class="box">
<h2>💌 Letter</h2>
<p id="letter"></p>
</div></section>

<section><div class="box">
<img src="https://raw.githubusercontent.com/kirtanuce23109/I-am-sorry-/main/babby1.jpg.jpeg" style="max-width:320px;width:100%;border-radius:20px">
<h2>Will You Forgive Me? ❤️</h2>
<button onclick="yes()">YES ❤️</button>
<button id="no">NO 😡</button>
<h2 id="end"></h2>
</div></section>

<script>
let score=0;
function spawn(){
 let h=document.createElement('div');
 h.className='heart'; h.innerHTML='❤️';
 h.style.left=Math.random()*90+'%';
 game.appendChild(h);
 let y=0;
 let iv=setInterval(()=>{
   y+=5; h.style.top=y+'px';
   if(y>220){clearInterval(iv);h.remove();}
 },30);
 h.onclick=()=>{
   score++;
   scoreEl.innerHTML=score+'/10';
   h.remove(); clearInterval(iv);
   if(score>=10) scoreEl.innerHTML='🎉 You caught Bubuu\'s heart again ❤️';
 }
}
const scoreEl=document.getElementById('score');
setInterval(spawn,1000);

const txt="Dear Babby, the thing I regret most isn't missing the station. It is missing your glimpse and our quality time together. The way Babbyyy loves me means everything. Love, Bubuu ❤️";
let i=0;
(function t(){ if(i<txt.length){ letter.innerHTML+=txt[i++]; setTimeout(t,35);} })();

no.onmouseover=()=>{
 no.style.position='fixed';
 no.style.left=Math.random()*80+'vw';
 no.style.top=Math.random()*80+'vh';
}
function yes(){
 end.innerHTML='🥹 Thank you Babby ❤️ Bubuu owes you a Bollywood-style date.';
}
</script>
</body>
</html>
